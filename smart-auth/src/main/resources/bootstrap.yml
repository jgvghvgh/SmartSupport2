spring:
  application:
    name: smart-auth
  cloud:
    nacos:
      discovery:
        ip: 2
        server-addr:  # Nacos 地址
        username: nacos               # 如果 Nacos 设置了用户名密码
        password: nacos
        health-check-enabled: true
      config:
        server-addr:
        file-extension: yml
        name: smart-auth   # Data ID，不带后缀
        group: DEFAULT_GROUP