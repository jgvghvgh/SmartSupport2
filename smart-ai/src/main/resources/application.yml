server:
  port: 8081
spring:
  application:
    name: smart-ai
  cloud:
    nacos:
      discovery:
        server-addr:    # Nacos ??
        username: nacos               # ?? Nacos ????????
        password: nacos

# AI模式切换: original=原RAG模式, agent=ReAct Agent
ai:
  mode: agent
  provider: dashscope
  api-url: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation
  model: qwen2-72b-instruct
  access-key-id: your-access-key-id
  access-key-secret: your-access-key-secret
  temperature: 0.7
  # Rerank配置
  rerank:
    api-url: https://dashscope.aliyuncs.com/api/v1/services/rerank/rerank
    model: qwen2-reranker-7b-gemini-v1
    top-n: 5

# MCP配置
mcp:
  client:
    servers:
      #
      # - name: filesystem
      #   url: http://localhost:8083
      #   enabled: false

